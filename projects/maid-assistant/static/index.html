<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maid Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
  --accent: #4ade80; --accent-dim: #1a3a25;
  --yellow: #fbbf24; --yellow-dim: #3a2e0a;
  --red: #f87171; --red-dim: #3a1212;
  --blue: #60a5fa; --blue-dim: #1a2a3a;
  --text: #e2e8f0; --muted: #64748b; --card: #1e2130;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; min-height: 100vh; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 17px; font-weight: 600; color: var(--accent); }
.tabs { display: flex; gap: 4px; padding: 14px 24px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { padding: 8px 18px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; color: var(--muted); border: 1px solid transparent; border-bottom: none; background: transparent; }
.tab.active { background: var(--bg); color: var(--text); border-color: var(--border); }
.page { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
.page.active { display: block; }

.suggest-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.suggest-bar h2 { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
input[type="text"], select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 13px; font-size: 14px; outline: none; }
input[type="text"] { width: 260px; }
input[type="text"]:focus, select:focus { border-color: var(--accent); }
select option { background: #1a1d27; }

.btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #22c55e; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: var(--border); color: var(--text); }
.btn-ghost:hover { filter: brightness(1.2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 4px 8px; font-size: 14px; background: var(--border); border: none; border-radius: 6px; color: var(--text); cursor: pointer; line-height: 1; }
.btn-icon:hover { background: var(--accent); color: #000; }
.btn-icon.del:hover { background: var(--red); color: #000; }

.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-name { font-size: 15px; font-weight: 600; }
.card-meta { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
.card-reason { font-size: 13px; color: var(--muted); margin: 8px 0; line-height: 1.4; }
.card-pair { font-size: 12px; color: var(--accent); margin-bottom: 10px; }

.badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.badge-ready { background: var(--accent-dim); color: var(--accent); }
.badge-low { background: var(--yellow-dim); color: var(--yellow); }
.badge-missing { background: var(--red-dim); color: var(--red); }

.issues { margin-top: 8px; }
.issue { font-size: 12px; color: var(--muted); padding: 2px 0; }
.issue.missing { color: var(--red); }
.issue.low { color: var(--yellow); }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 15px; font-weight: 600; }

.meal-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
.meal-type-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; min-width: 60px; }
.meal-name { font-size: 15px; font-weight: 500; flex: 1; }
.meal-people { font-size: 12px; color: var(--muted); }

.stats-row { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 90px; }
.stat-val { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.green { color: var(--accent); } .yellow { color: var(--yellow); } .red { color: var(--red); }

.inv-section { margin-bottom: 24px; }
.inv-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
.inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 8px; }
.inv-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; display: flex; align-items: center; gap: 6px; }
.inv-item.out { border-color: var(--red); background: var(--red-dim); }
.inv-item.low { border-color: var(--yellow); background: var(--yellow-dim); }
.inv-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qty-display { font-size: 12px; color: var(--muted); white-space: nowrap; }
.inv-item.out .qty-display { color: var(--red); font-weight: 600; }
.inv-item.low .qty-display { color: var(--yellow); }
.inv-actions { display: flex; gap: 3px; flex-shrink: 0; }
.edit-input { width: 65px; background: var(--bg); border: 1px solid var(--accent); border-radius: 5px; color: var(--text); padding: 3px 6px; font-size: 12px; text-align: center; outline: none; }

.shop-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.shop-name { font-size: 14px; font-weight: 500; text-transform: capitalize; flex: 1; }
.shop-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
.shop-qty { font-size: 14px; color: var(--accent); font-weight: 600; white-space: nowrap; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 380px; max-width: 95vw; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
.modal-fields { display: grid; gap: 12px; }
.modal-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
.modal-field input, .modal-field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none; }
.modal-field input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

.loading { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
.empty { text-align: center; color: var(--muted); padding: 48px; font-size: 14px; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--blue-dim); color: var(--blue); text-transform: uppercase; letter-spacing: 0.3px; }
</style>
</head>
<body>

<header>
  <h1>🍽 Maid Assistant</h1>
  <span style="font-size:12px;color:var(--muted)" id="todayDate"></span>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('suggest',this)">Suggest Meals</button>
  <button class="tab" onclick="showTab('today',this)">Today's Plan</button>
  <button class="tab" onclick="showTab('inventory',this)">Inventory</button>
  <button class="tab" onclick="showTab('shopping',this)">Shopping</button>
</div>

<!-- SUGGEST -->
<div class="page active" id="page-suggest">
  <div class="suggest-bar">
    <h2>What should the maid cook?</h2>
    <div class="controls">
      <div class="field">
        <label>Tell the AI</label>
        <input type="text" id="promptInput" placeholder="pasta tonight, no dal, something quick…" />
      </div>
      <div class="field">
        <label>Meal</label>
        <select id="mealType">
          <option value="breakfast">Breakfast</option>
          <option value="lunch" selected>Lunch</option>
          <option value="dinner">Dinner</option>
          <option value="snack">Snack</option>
        </select>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="categoryFilter">
          <option value="">Any</option>
          <option value="dal">Dal</option>
          <option value="sabzi">Sabzi</option>
          <option value="pasta">Pasta</option>
          <option value="noodles">Noodles</option>
          <option value="wrap">Wraps</option>
          <option value="burger">Burger</option>
          <option value="sandwich">Sandwich</option>
          <option value="salad">Salad</option>
          <option value="rice">Rice</option>
          <option value="breakfast">Breakfast</option>
        </select>
      </div>
      <div class="field">
        <label>People</label>
        <select id="peopleCount">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="getSuggestions()" id="suggestBtn">Suggest →</button>
    </div>
  </div>
  <div id="suggestionsArea"></div>
</div>

<!-- TODAY -->
<div class="page" id="page-today">
  <div class="section-header">
    <span class="section-title">Today's Meal Plan</span>
    <button class="btn btn-ghost" onclick="loadToday()">↻ Refresh</button>
  </div>
  <div id="todayArea"><div class="loading">Loading…</div></div>
</div>

<!-- INVENTORY -->
<div class="page" id="page-inventory">
  <div class="section-header">
    <span class="section-title">Pantry</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="loadInventory()">↻ Refresh</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Item</button>
    </div>
  </div>
  <div class="stats-row" id="invStats"></div>
  <div id="inventoryArea"><div class="loading">Loading…</div></div>
</div>

<!-- SHOPPING -->
<div class="page" id="page-shopping">
  <div class="section-header">
    <span class="section-title">Shopping List</span>
    <button class="btn btn-ghost" onclick="loadShopping()">↻ Refresh</button>
  </div>
  <div id="shoppingArea"><div class="loading">Loading…</div></div>
  <div id="shoppingActions" style="margin-top:16px;display:none">
    <button class="btn btn-primary" onclick="confirmOrder()">✓ Confirm Order — update stock</button>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add Inventory Item</h3>
    <div class="modal-fields">
      <div class="modal-field">
        <label>Item Name</label>
        <input type="text" id="newItemName" placeholder="e.g. lettuce or pasta_sauce" />
      </div>
      <div class="modal-field">
        <label>Category</label>
        <select id="newItemCategory">
          <option value="vegetables">Vegetables</option>
          <option value="pantry">Pantry / Western</option>
          <option value="staples">Staples</option>
          <option value="dairy">Dairy</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Current Quantity</label>
        <input type="text" id="newItemQty" placeholder="0" />
      </div>
      <div class="modal-field">
        <label>Unit</label>
        <select id="newItemUnit">
          <option value="grams">grams</option>
          <option value="ml">ml</option>
          <option value="pieces">pieces</option>
          <option value="slices">slices</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Reorder Threshold</label>
        <input type="text" id="newItemThreshold" placeholder="100" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddItem()">Add</button>
    </div>
  </div>
</div>

<script>
let currentShoppingItems = [];

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {
  weekday: 'long', day: 'numeric', month: 'long'
});

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'today') loadToday();
  if (name === 'inventory') loadInventory();
  if (name === 'shopping') loadShopping();
}

// ── SUGGEST ──────────────────────────────────────────────────────────────

async function getSuggestions() {
  const prompt = document.getElementById('promptInput').value || 'suggest something good';
  const mealType = document.getElementById('mealType').value;
  const people = parseInt(document.getElementById('peopleCount').value);
  const category = document.getElementById('categoryFilter').value;
  const btn = document.getElementById('suggestBtn');

  const fullPrompt = category ? `${prompt} [prefer category: ${category}]` : prompt;

  btn.disabled = true; btn.textContent = 'Thinking…';
  document.getElementById('suggestionsArea').innerHTML = '<div class="loading">AI is checking your pantry…</div>';

  try {
    const res = await fetch('/api/suggest', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: fullPrompt, meal_type: mealType, people, recent_meals: []})
    });
    const data = await res.json();
    renderSuggestions(data.suggestions, people, mealType);
  } catch(e) {
    document.getElementById('suggestionsArea').innerHTML = '<div class="empty">Server not running? cd maid-assistant && uvicorn api.main:app --port 8080</div>';
  }

  btn.disabled = false; btn.textContent = 'Suggest →';
}

function renderSuggestions(suggestions, people, mealType) {
  if (!suggestions || !suggestions.length) {
    document.getElementById('suggestionsArea').innerHTML = '<div class="empty">No results. Try different prompt or category.</div>';
    return;
  }
  const cards = suggestions.map(s => {
    const av = s.availability;
    const badgeCls = `badge-${av.status}`;
    const badgeLabel = av.status === 'ready' ? '✓ Ready' : av.status === 'low' ? '⚠ Low stock' : '✗ Missing';
    const missingHtml = av.missing.map(m =>
      `<div class="issue missing">✗ ${m.name.replace(/_/g,' ')}: need ${m.needed}g, have ${m.have}g</div>`
    ).join('');
    const lowHtml = av.low.map(l =>
      `<div class="issue low">⚠ ${l.name.replace(/_/g,' ')}: only ${l.have}g left</div>`
    ).join('');
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-name">${s.name}</div>
            <div class="card-meta"><span class="tag">${s.category}</span> · ${s.cook_time || 20} min</div>
          </div>
          <span class="badge ${badgeCls}">${badgeLabel}</span>
        </div>
        ${s.reason ? `<div class="card-reason">${s.reason}</div>` : ''}
        ${s.pair_with ? `<div class="card-pair">Pair with: ${s.pair_with}</div>` : ''}
        ${missingHtml || lowHtml ? `<div class="issues">${missingHtml}${lowHtml}</div>` : ''}
        <div style="margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="confirmMeal('${s.id}','${mealType}',${people})">Add to today</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('suggestionsArea').innerHTML = `
    <div class="section-header"><span class="section-title">${suggestions.length} suggestions · ${mealType} · ${people} people</span></div>
    <div class="grid-4">${cards}</div>`;
}

async function confirmMeal(recipeId, mealType, people) {
  const res = await fetch('/api/plan/confirm', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({recipe_id: recipeId, meal_type: mealType, people})
  });
  const data = await res.json();
  if (data.confirmed) {
    const n = data.low_stock.length;
    alert(`✓ ${data.recipe} added!\n${n > 0 ? `⚠ ${n} items now low — check Shopping tab.` : 'Pantry looks good.'}`);
  }
}

// ── TODAY ────────────────────────────────────────────────────────────────

async function loadToday() {
  document.getElementById('todayArea').innerHTML = '<div class="loading">Loading…</div>';
  const res = await fetch('/api/plan/today');
  const data = await res.json();
  if (!data.meals.length) {
    document.getElementById('todayArea').innerHTML = '<div class="empty">No meals planned yet. Go to Suggest Meals.</div>';
    return;
  }
  document.getElementById('todayArea').innerHTML = data.meals.map(m => `
    <div class="meal-row">
      <span class="meal-type-label">${m.meal_type}</span>
      <span class="meal-name">${m.name}</span>
      <span class="meal-people">${m.people} people</span>
    </div>`).join('');
}

// ── INVENTORY ────────────────────────────────────────────────────────────

async function loadInventory() {
  const res = await fetch('/api/inventory');
  const data = await res.json();

  document.getElementById('invStats').innerHTML = `
    <div class="stat"><div class="stat-val green">${data.items.length}</div><div class="stat-lbl">Total Items</div></div>
    <div class="stat"><div class="stat-val yellow">${data.low_count}</div><div class="stat-lbl">Low Stock</div></div>
    <div class="stat"><div class="stat-val red">${data.out_count}</div><div class="stat-lbl">Out of Stock</div></div>`;

  const byCategory = {};
  data.items.forEach(item => {
    const cat = item.category || 'other';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(item);
  });

  const catOrder = ['vegetables', 'dairy', 'pantry', 'staples'];
  const orderedCats = [
    ...catOrder.filter(c => byCategory[c]),
    ...Object.keys(byCategory).filter(c => !catOrder.includes(c))
  ];

  document.getElementById('inventoryArea').innerHTML = orderedCats.map(cat => `
    <div class="inv-section">
      <h3>${cat} (${byCategory[cat].length})</h3>
      <div class="inv-grid">
        ${byCategory[cat].map(item => {
          const cls = item.quantity === 0 ? 'out' : item.quantity <= item.threshold ? 'low' : '';
          const displayName = item.item_name.replace(/_/g, ' ');
          const displayQty = item.quantity > 0 ? `${item.quantity}${item.unit}` : 'OUT';
          const key = item.item_name;
          return `
            <div class="inv-item ${cls}" id="row-${key}">
              <span class="inv-name" title="${displayName}">${displayName}</span>
              <span class="qty-display" id="qty-${key}">${displayQty}</span>
              <div class="inv-actions">
                <button class="btn-icon" onclick="startEdit('${key}',${item.quantity},'${item.unit}')" title="Edit quantity">✏</button>
                <button class="btn-icon del" onclick="deleteItem('${key}','${displayName}')" title="Remove">✕</button>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function startEdit(key, currentQty, unit) {
  const qtyEl = document.getElementById(`qty-${key}`);
  if (!qtyEl) return;
  qtyEl.outerHTML = `
    <input class="edit-input" id="ei-${key}" type="number" value="${currentQty}" min="0" step="50"
      onkeydown="if(event.key==='Enter')saveEdit('${key}','${unit}');if(event.key==='Escape')loadInventory();" />
    <button class="btn-icon" onclick="saveEdit('${key}','${unit}')" title="Save">✓</button>`;
  const inp = document.getElementById(`ei-${key}`);
  if (inp) { inp.focus(); inp.select(); }
}

async function saveEdit(key, unit) {
  const inp = document.getElementById(`ei-${key}`);
  if (!inp) return;
  const newQty = parseFloat(inp.value) || 0;
  await fetch('/api/inventory/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({item_name: key, quantity: newQty, operation: 'set'})
  });
  loadInventory();
}

async function deleteItem(key, displayName) {
  if (!confirm(`Remove "${displayName}" from inventory?`)) return;
  await fetch(`/api/inventory/${encodeURIComponent(key)}`, {method: 'DELETE'});
  loadInventory();
}

function openAddModal() {
  document.getElementById('addModal').classList.add('open');
  document.getElementById('newItemName').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('newItemName').value = '';
  document.getElementById('newItemQty').value = '';
  document.getElementById('newItemThreshold').value = '';
}

async function submitAddItem() {
  const name = document.getElementById('newItemName').value.trim();
  if (!name) { alert('Item name required'); return; }
  const qty = parseFloat(document.getElementById('newItemQty').value) || 0;
  const threshold = parseFloat(document.getElementById('newItemThreshold').value) || 100;
  const category = document.getElementById('newItemCategory').value;
  const unit = document.getElementById('newItemUnit').value;

  const res = await fetch('/api/inventory/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({item_name: name, category, quantity: qty, unit, threshold})
  });

  if (res.status === 409) { alert('Item already exists'); return; }
  if (!res.ok) { alert('Error adding item'); return; }
  closeAddModal();
  loadInventory();
}

document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

// ── SHOPPING ─────────────────────────────────────────────────────────────

async function loadShopping() {
  document.getElementById('shoppingArea').innerHTML = '<div class="loading">Loading…</div>';
  const res = await fetch('/api/shopping/list');
  const data = await res.json();
  currentShoppingItems = data.items;

  if (!data.items.length) {
    document.getElementById('shoppingArea').innerHTML = '<div class="empty">✓ All stocked up. Nothing to order.</div>';
    document.getElementById('shoppingActions').style.display = 'none';
    return;
  }

  document.getElementById('shoppingArea').innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${data.total_items} items to restock</div>
    ${data.items.map(item => `
      <div class="shop-row">
        <div>
          <div class="shop-name">${item.name.replace(/_/g,' ')}</div>
          <div class="shop-detail">Have ${item.current}${item.unit} · threshold ${item.threshold}${item.unit}</div>
        </div>
        <div class="shop-qty">Order ${item.order_qty}${item.unit}</div>
      </div>`).join('')}`;
  document.getElementById('shoppingActions').style.display = 'block';
}

async function confirmOrder() {
  if (!currentShoppingItems.length) return;
  if (!confirm(`Confirm order for ${currentShoppingItems.length} items? Quantities will be added to inventory.`)) return;
  const res = await fetch('/api/shopping/confirm', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({items: currentShoppingItems})
  });
  const data = await res.json();
  alert(`✓ ${data.ordered} items ordered. Inventory updated.`);
  loadShopping();
}
</script>
